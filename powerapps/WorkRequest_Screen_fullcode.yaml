Screens:
  WorkRequest_Screen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =// 앱 바로가기 URL
        Set(
            varAppUrl,
            "https://apps.powerapps.com/play/e/ad9a8659-6733-e9a7-8538-15b993f9459a/a/ce55243d-1e25-4941-aa0e-aa3fdc2576ca?tenantId=f68dbec8-0e62-41cb-98b3-22f1aa40c4ea&hint=59dcc817-6c57-4dc8-ae81-5a7acfe3ae48&sourcetime=1773641347859"
        );

        //대리승인 팝업
        Set(varShowSelfApproveConfirmPopup, false);

        // =============================
        // [1] 현재 로그인 사용자 기본 정보
        // 사용자 이메일
        Set(varMyEmail, Lower(User().Email));

        // 사용자 정보 조회
        Set(
            varMyInfo,
            LookUp(
                UserInfo_DB,
                Lower('e-mail') = varMyEmail
            )
        );

        // [1] UserInfo_DB 이름 컬럼이 있으면 우선 사용
        Set(
            varMyNameFromDB,
            Coalesce(varMyInfo.이름_한글, "")
        );

        // [2] FullName 정제본
        Set(
            varMyNameFromFullName,
            If(
                IsBlank(Find("(", User().FullName)),
                Concatenate(
                    Trim(Right(User().FullName, Len(User().FullName) - Find(" ", User().FullName))),
                    Trim(Left(User().FullName, Find(" ", User().FullName)))
                ),
                Trim(Left(User().FullName, Find("(", User().FullName) - 1))
            )
        );

        // [3] 최종 저장용 이름
        Set(
            varMyName,
            If(
                !IsBlank(varMyNameFromDB),
                varMyNameFromDB,
                varMyNameFromFullName
            )
        );

        // =============================
        // [2] 작업자 이메일 고정
        // =============================
        Set(varWorkerEmail, Lower("jung.kim@tym.world"));
        //Set(varWorkerEmail, Lower("eunseong.kim@tym.world"));

        // =============================
        // [3] 현재 사용자 정보를 UserInfo_DB에서 조회
        // - Email 컬럼 기준으로 내 정보 1건 조회
        // =============================
        Set(
            varMyInfo,
            LookUp(
                UserInfo_DB,
                Lower('e-mail') = varMyEmail
            )
        );

        // =============================
        // [4] 내 조직 정보 변수화
        // - 이후 권한 분기, 필터, 신규 등록 시 기본값에 사용
        // =============================
        Set(varMyDept, Coalesce(varMyInfo.부문, ""));
        Set(varMyTeam, Coalesce(varMyInfo.팀, ""));
        Set(varMyJobGrade, Coalesce(varMyInfo.직급2, ""));

        // =============================
        // [5] 역할 판단
        // - 작업자 여부
        // - 팀장 여부
        // =============================
        Set(varIsWorker, varMyEmail = varWorkerEmail);
        Set(varIsTeamLeader, varMyJobGrade = "팀장");

        // =============================
        // [6] 화면 상태 변수 초기화
        // - 팝업 열림 여부
        // - 현재 선택한 요청
        // - 화면 모드(New / View / Edit)
        // =============================
        Set(varShowRequestPopup, false);
        Set(varRequestMode, "View");
        Set(varSelectedRequest, Defaults(das));

        // =============================
        // [7] 필터 기본값 초기화
        // - 기간 기본값: 30일
        // - 검색어: 빈값
        // - 반려 포함 여부: true
        // - 완료 포함 여부: true
        // =============================
        Set(varPeriodFilter, "30일");
        Set(varSearchText, "");
        Set(varIncludeRejected, true);
        Set(varIncludeCompleted, true);

        // =============================
        // [8] 날짜 필터용 기본 기간
        // - 사용자 지정 필터 확장 시 그대로 활용 가능
        // =============================
        Set(varDateFrom, DateAdd(Today(), -30, TimeUnit.Days));
        Set(varDateTo, Now());

        // =============================
        // [9] 토스트/알림/로딩 관련 기본값
        // =============================
        Set(varShowToast, false);
        Set(varToastMessage, "");

        // =============================
        // [10] 데이터 새로고침
        // - 메인 요청 리스트
        // - 댓글 리스트
        // - 사용자 정보 리스트
        // =============================
        Refresh(das);
        Refresh(WorkRequestComments_DB);
        Refresh(UserInfo_DB);
        // 프로젝트 마스터도 새로고침
        Refresh(Project_DB);
        Set(varSelectedImageAttachment, Blank());
        Set(varShowDeleteConfirmPopup, false);
