                              BorderColor: =RGBA(0, 0, 0, 1)
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              Font: =Font.Verdana
                              FontSize: =14
                              OnSelect: |-
                                =// =============================
                                // 팀장 승인
                                // PendingLeader -> PendingWorker
                                // =============================

                                Patch(
                                    das,
                                    varSelectedRequest,
                                    {
                                        ApprovalState: "PendingWorker",
                                        ApprovedAt: Now(),
                                        ApprovedByName: varMyName,
                                        ApprovedByEmail: varMyEmail,
                                        IsMySelfApproved: false,
                                        LastActionByName: varMyName,
                                        LastActionByEmail: varMyEmail,
                                        LastActionAt: Now()
                                    }
                                );

                                Patch(
                                    WorkRequestComments_DB,
                                    Defaults(WorkRequestComments_DB),
                                    {
                                        Title: "Comment",
                                        RequestID: varSelectedRequest.ID,
                                        RequestTitle: varSelectedRequest.Title,
                                        RequestNo: varSelectedRequest.RequestNo,
                                        CommentText: varMyName & "님이 팀장 승인을 완료했습니다. 작업자 확인 대기 상태입니다.",
                                        CommentType: "LeaderApprove",
                                        CommentByName: varMyName,
                                        CommentByEmail: varMyEmail,
                                        CommentRole: "Leader",
                                        CommentAt: Now(),
                                        IsSystemComment: true,
                                        IsVisible: true
                                    }
                                );

                                // 의뢰자 알림
                                If(
                                    !IsBlank(varSelectedRequest.RequesterEmail),
                                    Office365Outlook.SendEmailV2(
                                        varSelectedRequest.RequesterEmail,
                                        "[작업의뢰] 팀장 승인 완료 - " & varSelectedRequest.RequestNo,
                                        Concatenate(
