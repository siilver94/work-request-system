                        - btnLeaderReject:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =RGBA(220, 38, 38, 1)
                              BorderColor: =RGBA(220, 38, 38, 1)
                              Font: =Font.Verdana
                              FontSize: =14
                              OnSelect: |-
                                =If(
                                    IsBlank(Trim(txtLeaderRejectReason.Text)),
                                    Notify(
                                        "반려 사유를 입력해 주세요.",
                                        NotificationType.Warning
                                    ),

                                    Patch(
                                        das,
                                        varSelectedRequest,
                                        {
                                            Stage: "Completed",
                                            ApprovalState: "RejectedByLeader",
                                            CloseResult: "Cancelled",
                                            RejectedAt: Now(),
                                            RejectedByName: varMyName,
                                            RejectedByEmail: varMyEmail,
                                            RejectReason: Trim(txtLeaderRejectReason.Text),
                                            IsMySelfApproved: false,
                                            LastActionByName: varMyName,
                                            LastActionByEmail: varMyEmail,
                                            LastActionAt: Now()
                                        }
                                    );

                                    Patch(
                                        WorkRequestComments_DB,
                                        Defaults(WorkRequestComments_DB),
                                        {
                                            Title: "Comment",
                                            RequestID: varSelectedRequest.ID,
                                            RequestTitle: varSelectedRequest.Title,
                                            RequestNo: varSelectedRequest.RequestNo,
                                            CommentText: varMyName & "님이 팀장 반려했습니다. 사유: " & Trim(txtLeaderRejectReason.Text),
                                            CommentType: "LeaderReject",
                                            CommentByName: varMyName,
                                            CommentByEmail: varMyEmail,
                                            CommentRole: "Leader",
                                            CommentAt: Now(),
                                            IsSystemComment: true,
                                            IsVisible: true
                                        }
                                    );

                                    If(
                                        !IsBlank(varSelectedRequest.RequesterEmail),
                                        Office365Outlook.SendEmailV2(
                                            varSelectedRequest.RequesterEmail,
                                            "[작업의뢰] 팀장 반려 - " & varSelectedRequest.RequestNo,
                                            Concatenate(
                                                "<div style='font-family:Segoe UI;'>",
                                                "<h3>작업의뢰 반려 안내</h3>",
                                                "<p>아래 작업의뢰가 팀장에 의해 반려되었습니다.</p>",
                                                "<p><b>요청번호:</b> ", varSelectedRequest.RequestNo, "</p>",
                                                "<p><b>제목:</b> ", varSelectedRequest.Title, "</p>",
                                                "<p><b>반려자:</b> ", varMyName, "</p>",
                                                "<p><b>반려사유:</b> ", Trim(txtLeaderRejectReason.Text), "</p>",
                                                "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                                                "</div>"
                                            ),
                                            {
                                                IsHtml: true,
                                                Importance: "High"
                                            }
                                        )
                                    );

                                    Refresh(das);
                                    Refresh(WorkRequestComments_DB);
                                    Set(varSelectedRequest, LookUp(das, ID = varSelectedRequest.ID));

                                    Set(varToastMessage, "팀장 반려가 완료되었습니다.");
                                    Set(varShowToast, true)
                                )
                              Text: ="반려"
                              Visible: |-
                                =varSelectedRequest.Stage = "Start" &&
                                varSelectedRequest.ApprovalState = "PendingLeader" &&
                                varIsTeamLeader &&
                                varSelectedRequest.RequesterTeamSnapshot = varMyTeam
