                      Properties:
                        BorderColor: =RGBA(243, 242, 241, 1)
                        DataSource: =das
                        Height: =545
                        Item: =varSelectedRequest
                        OnSuccess: |-
                          =// =============================
                          // 신규 저장 후 시스템 컬럼 자동 세팅
                          // =============================
                          If(
                              varRequestMode = "New",

                              // 1. 신규 의뢰번호 생성
                              Set(
                                  varNewRequestNo,
                                  "WR-" & Text(Year(Now())) & "-" & Text(Self.LastSubmit.ID, "0000")
                              );

                              // 2. 현재 요청자의 팀 팀장 정보 조회
                              Set(
                                  varApproverInfo,
                                  LookUp(
                                      UserInfo_DB,
                                      팀 = varMyTeam &&
                                      직급2 = "팀장"
                                  )
                              );

                              // 3. 메인 요청 DB에 시스템 정보 보강 저장
                              Patch(
                                  das,
                                  Self.LastSubmit,
                                  {
                                      RequestNo: varNewRequestNo,

                                      // 요청자 정보 스냅샷
                                      RequesterName: varMyName,
                                      RequesterEmail: varMyEmail,
                                      RequesterDeptSnapshot: varMyDept,
                                      RequesterTeamSnapshot: varMyTeam,
                                      RequesterJobGradeSnapshot: varMyJobGrade,

                                      // 결재/진행 상태 초기값
                                      Stage: "Start",
                                      ApprovalState: "PendingLeader",
                                      CloseResult: Blank(),
                                      IsMySelfApproved: false,

                                      // 팀장 정보
                                      ApproverEmail: Coalesce(varApproverInfo.'e-mail', ""),

                                      // 작업자 정보 초기화
                                      WorkerName: Blank(),
                                      WorkerEmail: Blank(),

                                      // 시간 로그
                                      SubmittedAt: Now(),

                                      // 첨부 여부
                                      HasAttachment: CountRows(DataCardValue12.Attachments) > 0,

                                      // 마지막 처리 정보
                                      LastActionByName: varMyName,
                                      LastActionByEmail: varMyEmail,
                                      LastActionAt: Now()
                                  }
                              );

                              // 4. 저장된 최신 레코드 다시 조회
                              Set(
                                  varNewSavedRequest,
                                  LookUp(das, ID = Self.LastSubmit.ID)
                              );

                              // 5. 댓글 로그 1건 자동 생성
                              Patch(
                                  WorkRequestComments_DB,
                                  Defaults(WorkRequestComments_DB),
                                  {
                                      Title: "Comment",
                                      RequestID: Self.LastSubmit.ID,
                                      RequestTitle: Self.LastSubmit.Title,
                                      RequestNo: varNewRequestNo,
                                      CommentText: varMyName & "님이 작업의뢰를 등록했습니다.",
                                      CommentType: "Submit",
                                      CommentByName: varMyName,
                                      CommentByEmail: varMyEmail,
                                      CommentRole: "Requester",
                                      CommentAt: Now(),
                                      IsSystemComment: true,
                                      IsVisible: true
                                  }
                              );

                              // 6. 팀장 메일 알림
                              If(
                                  !IsBlank(varNewSavedRequest.ApproverEmail),
                                  Office365Outlook.SendEmailV2(
                                      varNewSavedRequest.ApproverEmail,
                                      "[작업의뢰] 팀장 승인 요청 - " & varNewSavedRequest.RequestNo,
                                      Concatenate(
                                          "<div style='font-family:Segoe UI;'>",
                                          "<h3>작업의뢰 승인 요청</h3>",
                                          "<p>아래 작업의뢰에 대한 팀장 승인이 필요합니다.</p>",
                                          "<p><b>요청번호:</b> ", varNewSavedRequest.RequestNo, "</p>",
                                          "<p><b>제목:</b> ", varNewSavedRequest.Title, "</p>",
                                          "<p><b>의뢰자:</b> ", varNewSavedRequest.RequesterName, "</p>",
                                          "<p><b>팀:</b> ", varNewSavedRequest.RequesterTeamSnapshot, "</p>",
                                          "<p><b>프로젝트:</b> ", Coalesce(varNewSavedRequest.ProjectName, "-"), "</p>",
                                          "<p><b>희망완료일:</b> ",
                                              If(
                                                  IsBlank(varNewSavedRequest.DesiredDueDate),
                                                  "-",
                                                  Text(varNewSavedRequest.DesiredDueDate, "yyyy-mm-dd")
                                              ),
                                          "</p>",
                                          "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                                          "</div>"
                                      ),
                                      {
                                          IsHtml: true,
                                          Importance: "High"
                                      }
                                  )
                              )
                          );

                          // =============================
                          // 저장 후 공통 처리
                          // =============================
                          Refresh(das);
                          Refresh(WorkRequestComments_DB);

                          ResetForm(frmRequest);
                          Set(varShowRequestPopup, false);
                          Set(varRequestMode, "View");
                          Set(varSelectedRequest, Defaults(das));

                          Set(varToastMessage, "작업의뢰가 등록되었습니다.");
                          Set(varShowToast, true);
